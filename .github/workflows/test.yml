name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache JUnit standalone jar
        uses: actions/cache@v4
        with:
          path: tools/junit-console.jar
          key: junit-console-1.10.2

      - name: Build + run tests
        run: ./test.sh
